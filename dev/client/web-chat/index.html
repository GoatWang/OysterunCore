<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"
    />
    <title>Oysterun</title>
    <meta name="name" content="Oysterun" />
    <meta name="author" content="Ajay Bura" />
    <meta
      name="description"
      content="A Matrix client where you can enjoy the conversation using simple, elegant and secure interface protected by e2ee with the power of open source."
    />
    <meta name="keywords" content="oysterun, matrix, matrix client, matrix.org" />

    <meta property="og:title" content="Oysterun" />
    <meta property="og:url" content="/app/sessions" />
    <meta property="og:image" content="/static/favicons/oysterun_logo_v5.PNG" />
    <meta
      property="og:description"
      content="A Matrix client where you can enjoy the conversation using simple, elegant and secure interface protected by e2ee with the power of open source."
    />
    <meta name="theme-color" content="#9b968d" />

    <link
      id="favicon"
      rel="icon"
      type="image/png"
      sizes="1024x1024"
      href="/static/favicons/oysterun_logo_v5.PNG"
    />
    <link rel="shortcut icon" type="image/png" href="/static/favicons/oysterun_logo_v5.PNG" />

    <link rel="manifest" href="/app/chat-assets/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Oysterun" />
    <meta name="apple-mobile-web-app-title" content="Oysterun" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <link rel="apple-touch-icon" sizes="57x57" href="/static/favicons/oysterun_logo_v5.PNG" />
    <link rel="apple-touch-icon" sizes="60x60" href="/static/favicons/oysterun_logo_v5.PNG" />
    <link rel="apple-touch-icon" sizes="72x72" href="/static/favicons/oysterun_logo_v5.PNG" />
    <link rel="apple-touch-icon" sizes="76x76" href="/static/favicons/oysterun_logo_v5.PNG" />
    <link rel="apple-touch-icon" sizes="114x114" href="/static/favicons/oysterun_logo_v5.PNG" />
    <link rel="apple-touch-icon" sizes="120x120" href="/static/favicons/oysterun_logo_v5.PNG" />
    <link rel="apple-touch-icon" sizes="144x144" href="/static/favicons/oysterun_logo_v5.PNG" />
    <link rel="apple-touch-icon" sizes="152x152" href="/static/favicons/oysterun_logo_v5.PNG" />
    <link rel="apple-touch-icon" sizes="167x167" href="/static/favicons/oysterun_logo_v5.PNG" />
    <link rel="apple-touch-icon" sizes="180x180" href="/static/favicons/oysterun_logo_v5.PNG" />
    <style>
      html,
      body,
      #root {
        min-height: 100%;
      }

      body {
        margin: 0;
        background: #9b968d;
      }

      .oysterun-web-chat-loading-shell {
        box-sizing: border-box;
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: clamp(104px, 24vh, 240px) 18px 32px;
        color: #2b241f;
        background: #9b968d;
        font-family:
          Inter,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      .oysterun-web-chat-loading-card {
        box-sizing: border-box;
        width: min(520px, 100%);
        min-height: 274px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        padding: 38px 34px;
        border: 1px solid rgba(255, 255, 255, 0.68);
        border-radius: 30px;
        background: #fffaf5;
        box-shadow: 0 24px 70px rgba(64, 48, 36, 0.22);
        text-align: center;
      }

      .oysterun-web-chat-loading-mark {
        width: 38px;
        height: 38px;
        border-radius: 999px;
        border: 3px solid rgba(185, 116, 74, 0.2);
        border-top-color: #b8744a;
        animation: oysterun-original-transition-spin 900ms linear infinite;
      }

      .oysterun-web-chat-loading-eyebrow {
        margin-top: 4px;
        padding: 6px 12px;
        border-radius: 999px;
        background: #f5d2bd;
        color: #8d5638;
        font-size: 11px;
        font-weight: 700;
        line-height: 1;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .oysterun-web-chat-loading-title {
        margin: 0;
        color: #2b241f;
        font-size: 28px;
        font-weight: 650;
        line-height: 1.18;
        letter-spacing: 0;
      }

      .oysterun-web-chat-loading-copy {
        max-width: 30rem;
        margin: 0;
        color: #6d635b;
        font-size: 15px;
        line-height: 1.5;
      }

      @keyframes oysterun-original-transition-spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (max-width: 640px) {
        .oysterun-web-chat-loading-shell {
          padding-top: clamp(76px, 22vh, 150px);
        }

        .oysterun-web-chat-loading-card {
          min-height: 252px;
          padding: 32px 24px;
        }
      }
    </style>
  </head>
  <body id="appBody">
    <script>
      window.global ||= window;
    </script>
    <div id="root">
      <div
        id="oysterun-web-chat-pre-react-loading"
        class="oysterun-web-chat-loading-shell"
        role="status"
        aria-live="polite"
        aria-busy="true"
        data-oysterun-unified-loading-surface="pre-react-web-chat"
        data-oysterun-loading-contract="routec-unified-loading-v1"
        data-oysterun-original-transition-contract="routec-original-transition-v1"
        data-oysterun-original-transition-title="Opening Oysterun..."
        data-oysterun-original-transition-copy="Loading sessions..."
        data-oysterun-loading-title="Opening Oysterun..."
        data-oysterun-loading-copy="Loading sessions..."
        data-oysterun-loading-stage="document_shell"
        data-oysterun-pre-react-loading="true"
        data-oysterun-clean-session-loading-surface="pre-react-web-chat"
        data-oysterun-blank-screen-prevention="true"
        data-oysterun-loading-raw-secret-visible="false"
        data-oysterun-loading-host-local-path-visible="false"
        data-oysterun-loading-recovery-visible="false"
        data-oysterun-react-removal-contract="createRoot-render-replaces-root-children"
      >
        <div class="oysterun-web-chat-loading-card">
          <div class="oysterun-web-chat-loading-mark" aria-hidden="true"></div>
          <div class="oysterun-web-chat-loading-eyebrow">Oysterun</div>
          <h1 class="oysterun-web-chat-loading-title">Opening Oysterun...</h1>
          <p class="oysterun-web-chat-loading-copy">Loading sessions...</p>
        </div>
      </div>
    </div>
    <div id="portalContainer"></div>
    <script type="module" src="./src/index.tsx"></script>
  </body>
</html>
